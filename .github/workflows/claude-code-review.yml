name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"
    #   - "src/**/*.tsx"
    #   - "src/**/*.js"
    #   - "src/**/*.jsx"

jobs:
  claude-review:
    # Skip Dependabot PRs — the bot cannot access repository secrets
    if: github.actor != 'dependabot[bot]'

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # required to post the review comment - read-only caused every run to fail with a permission denial
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          # --comment is required to actually post findings as inline PR
          # comments - without it, the skill only returns findings as plain
          # text output, which is never surfaced anywhere in a headless CI
          # run (the previous config ran "successfully" but posted nothing).
          prompt: '/code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }} --comment'
          allowed_bots: 'claude[bot]'
          # Without an explicit allowlist, any tool call has no way to get
          # interactively approved in a non-interactive CI run and is
          # auto-denied. Skill is required first - the prompt's very first
          # action is invoking the code-review:code-review skill itself, and
          # without it listed here that call was denied immediately, causing
          # the agent to improvise a partial review via ad hoc subagents
          # instead (and never finish, hence zero comments posted despite
          # completing "successfully"). Bash/Read/Grep/Glob are what the
          # skill needs once it's actually running to inspect the diff.
          claude_args: '--allowedTools Skill,Bash,Read,Grep,Glob'
          show_full_output: true # temporary - confirming the Skill-tool fix actually works end to end
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options
